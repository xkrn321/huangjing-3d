<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>博物馆典藏 · 中药材 3D 模型</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0604; font-family: -apple-system, 'STSong', 'Songti SC', 'PingFang SC', 'Microsoft YaHei', serif; color: #f0dcc0; }
    body { display: flex; align-items: center; justify-content: center; }

    /* ─── BG Particles ─── */
    #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ─── Content ─── */
    .content { position: relative; z-index: 1; width: 100%; max-width: 1200px; padding: 40px 30px; text-align: center; }

    .title { font-size: clamp(28px, 5vw, 48px); font-weight: 700; letter-spacing: 6px; background: linear-gradient(135deg, #ffd700 0%, #ffaa00 40%, #cc8800 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 6px; text-shadow: none; }
    .subtitle { font-size: clamp(12px, 2vw, 16px); color: rgba(200,170,120,0.5); letter-spacing: 12px; font-weight: 300; margin-bottom: 50px; }
    .subtitle span { display: inline-block; animation: fadeIn 1.5s ease 0.3s both; }

    /* ─── Grid ─── */
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; max-width: 960px; margin: 0 auto; padding: 0 10px; }

    /* ─── Card ─── */
    .card {
      position: relative; border-radius: 20px; padding: 0; cursor: pointer; overflow: hidden;
      background: linear-gradient(160deg, rgba(25,15,8,0.85) 0%, rgba(10,5,2,0.9) 100%);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(200,160,100,0.15);
      transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      min-height: 200px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .card:hover {
      border-color: rgba(255,170,0,0.45);
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 40px rgba(255,170,0,0.08);
    }
    .card:active { transform: scale(0.97); }

    /* Card bg decorative glyph */
    .card-glyph {
      position: absolute; right: -10px; top: -10px; font-size: 100px; font-weight: 900;
      color: rgba(255,200,100,0.04); pointer-events: none; line-height: 1; user-select: none;
      transition: all 0.5s ease;
    }
    .card:hover .card-glyph { color: rgba(255,200,100,0.08); transform: scale(1.1) rotate(-3deg); }

    /* Card inner content */
    .card-icon-wrap {
      width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px; position: relative; z-index: 1;
      transition: all 0.4s ease;
    }
    .card-icon-wrap .icon-emoji { font-size: 28px; filter: drop-shadow(0 0 8px rgba(255,170,0,0.2)); }
    .card-name { font-size: 20px; font-weight: 600; color: #ffd080; letter-spacing: 3px; position: relative; z-index: 1; }
    .card-latin { font-size: 11px; color: rgba(200,170,120,0.4); letter-spacing: 1px; margin-bottom: 3px; font-style: italic; position: relative; z-index: 1; }
    .card-desc { font-size: 11px; color: rgba(200,170,120,0.55); letter-spacing: 1px; position: relative; z-index: 1; max-width: 160px; margin: 0 auto; line-height: 1.5; }
    .card-badge {
      position: absolute; bottom: 12px; right: 14px; font-size: 9px; letter-spacing: 2px;
      color: rgba(255,170,0,0.2); border: 1px solid rgba(255,170,0,0.1); border-radius: 20px;
      padding: 2px 10px; transition: all 0.3s ease;
    }
    .card:hover .card-badge { color: rgba(255,170,0,0.4); border-color: rgba(255,170,0,0.2); }

    /* Hover radial glow */
    .card::before {
      content: ''; position: absolute; width: 200px; height: 200px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,170,0,0.06) 0%, transparent 70%);
      top: var(--mx, 50%); left: var(--my, 50%); transform: translate(-50%, -50%);
      pointer-events: none; opacity: 0; transition: opacity 0.4s ease;
    }
    .card:hover::before { opacity: 1; }

    /* ─── Footer ─── */
    .footer-note { margin-top: 40px; font-size: 11px; color: rgba(200,170,120,0.2); letter-spacing: 4px; }
    .footer-note a { color: rgba(255,170,0,0.25); text-decoration: none; transition: color 0.3s; }
    .footer-note a:hover { color: rgba(255,170,0,0.5); }

    /* ─── Animations ─── */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .card { animation: fadeIn 0.8s ease both; }
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.4s; }
    .card:nth-child(5) { animation-delay: 0.5s; }
    .card:nth-child(6) { animation-delay: 0.6s; }

    /* ─── Responsive ─── */
    @media (max-width: 480px) {
      .content { padding: 20px 14px; }
      .grid { gap: 14px; grid-template-columns: repeat(2, 1fr); }
      .card { min-height: 150px; border-radius: 14px; }
      .card-icon-wrap { width: 44px; height: 44px; margin-bottom: 8px; }
      .card-icon-wrap .icon-emoji { font-size: 20px; }
      .card-name { font-size: 16px; }
      .card-latin { font-size: 9px; }
      .card-desc { font-size: 9px; max-width: 120px; }
      .card-glyph { font-size: 60px; }
      .subtitle { margin-bottom: 30px; letter-spacing: 6px; }
    }
    @media (max-width: 350px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Background Particles -->
  <canvas id="bg-canvas"></canvas>

  <!-- Main Content -->
  <div class="content">
    <div class="title">博物馆典藏</div>
    <div class="subtitle"><span>中 药 材 · 3 D 模 型</span></div>

    <div class="grid" id="herb-grid">
      <!-- Cards injected by JS -->
    </div>

    <div class="footer-note">
      <span>✦ 伸手 · 探索 · 感受 ✦</span>
    </div>
  </div>

  <script>
    // ─── Herb Data ───
    const HERBS = [
      {
        id: 'huangjing', glyph: '精', emoji: '🌿',
        name: '黄精', latin: 'Polygonatum sibiricum',
        desc: '补气养阴 · 健脾润肺', color: '#cca860',
        href: 'v10.html', ready: true
      },
      {
        id: 'renshen', glyph: '参', emoji: '🌱',
        name: '人参', latin: 'Panax ginseng',
        desc: '大补元气 · 复脉固脱', color: '#c89060',
        href: '#', ready: false
      },
      {
        id: 'lingzhi', glyph: '芝', emoji: '🍄',
        name: '灵芝', latin: 'Ganoderma lucidum',
        desc: '补气安神 · 止咳平喘', color: '#b87333',
        href: '#', ready: false
      },
      {
        id: 'danggui', glyph: '归', emoji: '🌸',
        name: '当归', latin: 'Angelica sinensis',
        desc: '补血活血 · 调经止痛', color: '#b8956a',
        href: '#', ready: false
      },
      {
        id: 'gouqi', glyph: '杞', emoji: '🔴',
        name: '枸杞', latin: 'Lycium barbarum',
        desc: '滋补肝肾 · 益精明目', color: '#d4443b',
        href: '#', ready: false
      },
      {
        id: 'huangqi', glyph: '芪', emoji: '🌾',
        name: '黄芪', latin: 'Astragalus membranaceus',
        desc: '补气升阳 · 固表止汗', color: '#c8a86a',
        href: '#', ready: false
      }
    ];

    // ─── Render Cards ───
    const grid = document.getElementById('herb-grid');
    HERBS.forEach(h => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.cursor = h.ready ? 'pointer' : 'not-allowed';
      if (!h.ready) card.style.opacity = '0.55';

      card.innerHTML = `
        <div class="card-glyph">${h.glyph}</div>
        <div class="card-icon-wrap" style="background: radial-gradient(circle at 30% 30%, rgba(255,170,0,0.08), transparent); border: 1px solid rgba(255,170,0,0.1);">
          <span class="icon-emoji">${h.emoji}</span>
        </div>
        <div class="card-name" style="color: ${h.color}">${h.name}</div>
        <div class="card-latin">${h.latin}</div>
        <div class="card-desc">${h.desc}</div>
        <div class="card-badge">${h.ready ? '可查看' : '即将上线'}</div>
      `;

      // Mouse-tracking glow
      card.addEventListener('mousemove', e => {
        const r = card.getBoundingClientRect();
        card.style.setProperty('--mx', (e.clientX - r.left) + 'px');
        card.style.setProperty('--my', (e.clientY - r.top) + 'px');
      });

      if (h.ready) {
        card.addEventListener('click', () => { window.location.href = h.href; });
      }
      grid.appendChild(card);
    });

    // ─── Background Floating Particles ───
    (function bgParticles() {
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d');
      let W, H, particles = [];

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      const COUNT = 60;
      for (let i = 0; i < COUNT; i++) {
        particles.push({
          x: Math.random() * W, y: Math.random() * H,
          vx: (Math.random() - 0.5) * 0.15,
          vy: -(Math.random() * 0.1 + 0.03),
          r: Math.random() * 2.5 + 0.5,
          o: Math.random() * 0.3 + 0.05,
          phase: Math.random() * Math.PI * 2
        });
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        const t = Date.now() / 1000;

        particles.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          p.vy -= 0.0005; // slow upward drift

          // Reset
          if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
          if (p.x < -10) { p.x = W + 10; }
          if (p.x > W + 10) { p.x = -10; }

          const flicker = Math.sin(t * 0.5 + p.phase) * 0.15 + 0.85;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,200,140,${p.o * flicker})`;
          ctx.fill();
        });
        requestAnimationFrame(draw);
      }
      draw();
    })();
  </script>
</body>
</html>
